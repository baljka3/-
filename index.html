<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>Асуулт/Хариулт</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<h1>📚 Асуулт/Хариулт</h1>

<div class="creator">

<input id="question" placeholder="Асуулт бичнэ">

<input id="a1" placeholder="Хариулт 1">
<input id="a2" placeholder="Хариулт 2">
<input id="a3" placeholder="Хариулт 3">
<input id="a4" placeholder="Хариулт 4">
<input id="a5" placeholder="Хариулт 5">

<select id="correct">
<option value="0">Зөв хариу 1</option>
<option value="1">Зөв хариу 2</option>
<option value="2">Зөв хариу 3</option>
<option value="3">Зөв хариу 4</option>
<option value="4">Зөв хариу 5</option>
</select>

<button onclick="addQuestion()">➕ Асуулт нэмэх</button>

</div>

<h2>📝 Тест</h2>

<div id="quiz"></div>

<button class="check" onclick="checkQuiz()">✔ Шалгах</button>

<div id="result"></div>

<script src="script.js"></script>


</body>
</html>
